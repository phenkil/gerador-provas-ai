<div class="main-container">
  
  <aside class="sidebar">
    <h2>🎓 Gerador Angular</h2>
    
    <div style="background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 15px; border: 1px solid #c8e6c9;">
      ✅ API Keys configuradas no sistema
    </div>

    <div class="form-group">
      <label>🤖 Escolha o Motor (IA)</label>
      <select [(ngModel)]="selectedModel">
        <option *ngFor="let m of availableModels" [ngValue]="m">
          {{ m.name }}
        </option>
      </select>
    </div>

    <hr>

    <div class="form-group">
      <label>Matéria</label>
      <input type="text" [(ngModel)]="examData.materia">
    </div>

    <div class="form-group">
      <label>Assunto</label>
      <input type="text" [(ngModel)]="examData.assunto">
    </div>

    <div class="form-group">
      <label>Ano</label>
      <input type="text" [(ngModel)]="examData.ano">
    </div>

    <button (click)="generate()" [disabled]="isLoading" class="btn-primary">
      {{ isLoading ? 'Gerando...' : 'Gerar Prova' }}
    </button>

    <div class="progress-container" *ngIf="isLoading || progress > 0">
      <div class="progress-bar" [style.width.%]="progress" 
           [class.success]="progress === 100"
           [class.error]="statusMessage.includes('Erro')"></div>
    </div>
    
    <div *ngIf="statusMessage" class="status-msg" 
         [class.error-msg]="statusMessage.includes('Erro')"
         [class.success-msg]="statusMessage.includes('Sucesso')">
      {{ statusMessage }}
    </div>
  </aside>

  <main class="result-area">
    <div class="toolbar">
      <div class="tabs">
        <button [class.active]="activeTab === 'preview'" (click)="activeTab = 'preview'">👁️ Visualizar</button>
        <button [class.active]="activeTab === 'code'" (click)="activeTab = 'code'">💻 Código</button>
      </div>
      
      <div class="actions">
        <button *ngIf="generatedHtml" (click)="copyCode()" class="btn-secondary">📋 Copiar</button>
        <button *ngIf="generatedHtml" (click)="downloadExam()" class="btn-success">💾 Salvar no PC</button>
      </div>
    </div>

    <div class="content">
      <div *ngIf="!generatedHtml && !isLoading" class="placeholder">
        <p>Configure os parâmetros e clique em Gerar.</p>
      </div>

      <div *ngIf="activeTab === 'preview' && generatedHtml" class="tab-content">
        <iframe [srcdoc]="safeHtmlUrl" frameborder="0"></iframe>
      </div>

      <div *ngIf="activeTab === 'code' && generatedHtml" class="tab-content">
        <textarea readonly>{{ generatedHtml }}</textarea>
      </div>
    </div>
  </main>
</div>
